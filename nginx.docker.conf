# ===========================================================================
# Nginx — PUMA Helpdesk (conteneur Docker)
# Le service API s'appelle "api" dans docker-compose (résolution DNS interne)
# proxy_buffering off est obligatoire pour les notifications SSE
# ===========================================================================

upstream puma_api {
  server api:3001;   # nom du service Docker Compose
  keepalive 64;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression Gzip
  gzip on;
  gzip_vary on;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    image/svg+xml;

  # Cache des assets compilés (hachés par Vite)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Proxy API + SSE (Server-Sent Events pour les notifications temps réel)
  location /api/ {
    proxy_pass         http://puma_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';   # keep-alive pour SSE
    proxy_buffering    off;                    # obligatoire pour SSE
    proxy_cache        off;
    proxy_read_timeout 3600s;                  # connexions SSE longues durée
    proxy_send_timeout 3600s;
    chunked_transfer_encoding on;
  }

  # SPA — toutes les routes vers index.html (routing React/Wouter)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
