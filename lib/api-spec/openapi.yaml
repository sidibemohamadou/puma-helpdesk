openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PUMA IT Helpdesk API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: tickets
    description: Ticket management
  - name: comments
    description: Ticket comments
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard and statistics
  - name: attachments
    description: File attachments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, pending, resolved, closed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: category
          in: query
          schema:
            type: string
            enum: [network, hardware, software, security, other]
        - name: assigneeId
          in: query
          schema:
            type: integer
        - name: createdById
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"

    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketBody"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketBody"
      responses:
        "200":
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

    delete:
      operationId: deleteTicket
      tags: [tickets]
      summary: Delete ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tickets/{id}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      operationId: createComment
      tags: [comments]
      summary: Add comment to ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [agent, technician, admin]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: createUser
      tags: [users]
      summary: Create user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent ticket activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/technician-performance:
    get:
      operationId: getTechnicianPerformance
      tags: [dashboard]
      summary: Get technician performance metrics
      responses:
        "200":
          description: Technician performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TechnicianPerformance"

  /dashboard/tickets-by-category:
    get:
      operationId: getTicketsByCategory
      tags: [dashboard]
      summary: Get tickets grouped by category
      responses:
        "200":
          description: Tickets by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /dashboard/tickets-by-priority:
    get:
      operationId: getTicketsByPriority
      tags: [dashboard]
      summary: Get tickets grouped by priority
      responses:
        "200":
          description: Tickets by priority
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriorityCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [agent, technician, admin]
        department:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - createdAt

    CreateUserBody:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [agent, technician, admin]
        department:
          type: string
      required:
        - email
        - name
        - password
        - role

    UpdateUserBody:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [agent, technician, admin]
        department:
          type: string
        password:
          type: string

    Ticket:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [network, hardware, software, security, other]
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, pending, resolved, closed]
        createdById:
          type: integer
        assigneeId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          $ref: "#/components/schemas/User"
        assignee:
          $ref: "#/components/schemas/User"
          nullable: true
      required:
        - id
        - title
        - description
        - category
        - priority
        - status
        - createdById
        - createdAt
        - updatedAt
        - createdBy

    TicketDetail:
      allOf:
        - $ref: "#/components/schemas/Ticket"
        - type: object
          properties:
            comments:
              type: array
              items:
                $ref: "#/components/schemas/Comment"
          required:
            - comments

    TicketListResponse:
      type: object
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - tickets
        - total
        - page
        - limit
        - totalPages

    CreateTicketBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [network, hardware, software, security, other]
        priority:
          type: string
          enum: [low, medium, high, critical]
        assigneeId:
          type: integer
      required:
        - title
        - description
        - category
        - priority

    UpdateTicketBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [network, hardware, software, security, other]
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, pending, resolved, closed]
        assigneeId:
          type: integer
          nullable: true

    Comment:
      type: object
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        authorId:
          type: integer
        content:
          type: string
        isInternal:
          type: boolean
        createdAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/User"
      required:
        - id
        - ticketId
        - authorId
        - content
        - isInternal
        - createdAt
        - author

    CreateCommentBody:
      type: object
      properties:
        content:
          type: string
        isInternal:
          type: boolean
          default: false
      required:
        - content

    DashboardStats:
      type: object
      properties:
        totalTickets:
          type: integer
        openTickets:
          type: integer
        inProgressTickets:
          type: integer
        pendingTickets:
          type: integer
        resolvedTickets:
          type: integer
        closedTickets:
          type: integer
        criticalTickets:
          type: integer
        avgResolutionTimeHours:
          type: number
          nullable: true
        totalUsers:
          type: integer
        totalTechnicians:
          type: integer
      required:
        - totalTickets
        - openTickets
        - inProgressTickets
        - pendingTickets
        - resolvedTickets
        - closedTickets
        - criticalTickets
        - totalUsers
        - totalTechnicians

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        ticketTitle:
          type: string
        action:
          type: string
        actorName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ticketId
        - ticketTitle
        - action
        - actorName
        - createdAt

    TechnicianPerformance:
      type: object
      properties:
        technicianId:
          type: integer
        technicianName:
          type: string
        assignedTickets:
          type: integer
        resolvedTickets:
          type: integer
        avgResolutionTimeHours:
          type: number
          nullable: true
      required:
        - technicianId
        - technicianName
        - assignedTickets
        - resolvedTickets

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
        - category
        - count

    PriorityCount:
      type: object
      properties:
        priority:
          type: string
        count:
          type: integer
      required:
        - priority
        - count
