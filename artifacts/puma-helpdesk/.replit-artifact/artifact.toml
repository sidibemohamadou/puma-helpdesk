kind = "web"
previewPath = "/"
title = "PUMA Helpdesk"
version = "1.0.0"
id = "artifacts/puma-helpdesk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25192

[services.development]
run = "pnpm --filter @workspace/puma-helpdesk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/puma-helpdesk", "run", "build" ]
publicDir = "artifacts/puma-helpdesk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25192"
BASE_PATH = "/"
